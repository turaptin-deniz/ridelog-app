<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Track (full speedometer range, 7 o'clock → 5 o'clock via top) -->
  <path d="M 11 26.7 A 10 10 0 1 1 21 26.7"
    stroke="#1e293b" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Active zone (blue, from start → ~70% speed) -->
  <path d="M 11 26.7 A 10 10 0 1 1 25.4 14.6"
    stroke="#3b82f6" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Needle -->
  <line x1="16" y1="18" x2="23.5" y2="15.3"
    stroke="#f43f5e" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Hub -->
  <circle cx="16" cy="18" r="2.2" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="16" cy="18" r="0.9" fill="white"/>
</svg>
